[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-readable-doc-generator"
version = "0.1.0"
description = "Transform documentation into AI-Agent-friendly formats with structured output and semantic tagging"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Developer", email = "dev@example.com" }
]
keywords = [
    "ai",
    "documentation",
    "llm",
    "mcp",
    "markdown",
    "converter"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.1.0",
    "mypy>=1.8.0",
]

[project.scripts]
ai-doc-converter = "ai_readable_doc_generator.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_readable_doc_generator"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]

[tool.mypy]
python_version = "3.11"
strict = true
